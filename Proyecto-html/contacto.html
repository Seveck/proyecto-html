<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Patitas Felices</title>
    <link rel="stylesheet" href="/css/contacto.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="/assets/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Patitas Felices</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="galeria.html">Galería</a>
            <a href="adoptar.html">Adoptar</a>
            <a href="contacto.html" class="active">Contacto</a>
        </nav>
    </header>

    <main class="seccion-contacto">
        <h2 class="titulo-contacto">Escríbenos un Mensaje</h2>
        
        <form class="formulario-contacto">
            <div class="grupo-formulario">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre">
            </div>

            <div class="grupo-formulario">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="grupo-formulario">
                <label for="telefono">Teléfono de contacto</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+57 1234567890">
            </div>

            <div class="grupo-formulario">
                <label for="mensaje">¿Por qué quieres adoptar?</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Cuéntanos un poco sobre ti y el hogar que ofreces..."></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
        </form>
    </main>

</body>
</html>
