<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Patitas Felices</title>
    <link rel="stylesheet" href="/css/contacto.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="/assets/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Patitas Felices</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="about-us.html">Conozcanos</a>
            <a href="adopt.html">Adoptar</a>
            <a href="contact.html" class="active">Contacto</a>
        </nav>
    </header>

    <main class="seccion-contacto">
        <h2 class="titulo-contacto">Escríbenos un Mensaje</h2>
        
        <form class="formulario-contacto">
            <div class="grupo-formulario">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" autofocus>
            </div>

            <div class="grupo-formulario">
                <label for="ciudad">Ciudad</label>
                <input type="text" id="ciudad" name="ciudad" placeholder="Ingresa tu ciudad">
            </div>

            <div class="grupo-formulario">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
            </div>

            <div class="grupo-formulario">
                <label for="telefono">Teléfono de contacto</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+57 1234567890">
            </div>

            <div class="grupo-formulario">
                <label for="motivo">Motivo del mensaje</label>
                <select id="motivo" name="motivo">
                    <option value="" disabled selected>Seleccione una opción</option>
                    <option value="adopcion">Adopción</option>
                    <option value="donacion">Donación</option>
                    <option value="voluntariado">Voluntariado</option>
                </select>
            </div>

            <div class="grupo-formulario">
                <label for="mensaje">Envíanos un mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje"></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
        </form>
    </main>

    <footer>
        <h5>
            © Patitas Felices - 2026 - <a href="patitasfelices@gmail.com">patitasfelices@gmail.com</a>
        </h5>
    </footer>

</body>
</html>
